{% load static %}

<link rel="stylesheet" href="{% static 'css/navbar.css'%}">

<div class="container-fluid" >
  <header class="header" >
    <a  class="logo">Michael Pacheco E.</a>
    <nav class="navbar">
      {%if user.is_authenticated%}
        {% if request.path|slice:":8" == "/sales/" %}
          <a href="{% url 'sales' %}" class="active">Dashboard</a>
          <a href="{% url 'sales' %}products/">Products</a>
          <a href="{% url 'sales' %}clients/">Clients</a>
          <a href="{% url 'sales' %}providers/">Providers</a>
          <a href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a href="{%url 'show_vehicles'%}" class="active">Vehicles</a>
          <a href="{% url 'rented_vehicles' %}">Rented</a>
          <a href="{% url 'create' %}">Create</a>
          <a href="{% url 'logout' %}">Logout</a>
        {% endif %}
      {% else%}
        <a href="{%url 'base'%}" class="active">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
      {%endif%}
    </nav>
  </header>
</div>
