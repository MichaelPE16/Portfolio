{% extends 'base.html' %}
{% block content %}



<main class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card" style="width: 19rem;">
        <div class="card-body">
            <h5 class="card-title">
                <h2>Login</h2>
            </h5>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-center "><button type="button" class="btn btn-primary">Login</button>
                </div>

            </form>
            <br>
            <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
        </div>
    </div>
</main>


{% endblock %}
